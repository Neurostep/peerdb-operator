# This rule is not used by the project peerdb-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the peerdb.peerdb.io.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: peerdb-operator
    app.kubernetes.io/managed-by: kustomize
  name: peerdbworkerpool-editor-role
rules:
- apiGroups:
  - peerdb.peerdb.io
  resources:
  - peerdbworkerpools
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - peerdb.peerdb.io
  resources:
  - peerdbworkerpools/status
  verbs:
  - get
